<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life RPG</title>

    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Rajdhani:wght@300;400;500;600;700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <h1>LIFE RPG</h1>

      <!-- HEADER -->
      <h2>XP Total: <span id="xp-total">0</span></h2>
      <h2>Nivel: <span id="level">1</span></h2>

      <div class="top-section">
        <!-- AVATAR -->
        <div class="avatar-section">
          <img
            id="avatar-img"
            src="https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/7b255405-7e3e-4b16-97ff-087fd8e83790/deu21r1-2848045c-3843-4ad6-a7d9-64a1673a7e9f.jpg?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1cm46YXBwOjdlMGQxODg5ODIyNjQzNzNhNWYwZDQxNWVhMGQyNmUwIiwiaXNzIjoidXJuOmFwcDo3ZTBkMTg4OTgyMjY0MzczYTVmMGQ0MTVlYTBkMjZlMCIsIm9iaiI6W1t7InBhdGgiOiIvZi83YjI1NTQwNS03ZTNlLTRiMTYtOTdmZi0wODdmZDhlODM3OTAvZGV1MjFyMS0yODQ4MDQ1Yy0zODQzLTRhZDYtYTdkOS02NGExNjczYTdlOWYuanBnIn1dXSwiYXVkIjpbInVybjpzZXJ2aWNlOmZpbGUuZG93bmxvYWQiXX0.9liHQsxf8o3k31WJ1xXCeVgzma_jepOEZVLXUJPpvWs"
            alt="avatar"
          />
          <h3 id="avatar-level">Nivel 1</h3>
        </div>

        <!-- STATS -->
        <div class="stats-section">
          <div>💪 Strength: <span id="stat-strength">0</span></div>
          <div>🧠 Intelligence: <span id="stat-intelligence">0</span></div>
          <div>⚡ Discipline: <span id="stat-discipline">0</span></div>
          <div>🎮 Skill: <span id="stat-skill">0</span></div>
        </div>

        <!-- ACTIVITY SECTION (XP) -->
        <div class="activity-section">
          <input
            id="activity-input"
            type="text"
            placeholder="Actividad realizada"
          />

          <select id="activity-type">
            <option value="strength">Gimnasio</option>
            <option value="intelligence">Estudio</option>
            <option value="discipline">Hábitos</option>
            <option value="skill">Juegos</option>
            <option value="strength">Deporte</option>
          </select>

          <input id="activity-date" type="date" />

          <button id="activity-btn">Agregar</button>

          <div class="history-section">
            <h2>Historial de logros</h2>
            <ul id="activity-log"></ul>
          </div>
        </div>
      </div>

      <!-- TASK SECTION -->
      <div class="task-section">
        <input id="task-input" type="text" placeholder="Nueva tarea..." />
        <button id="task-btn">Agregar</button>

        <div class="task-container">
          <div class="column">
            <h2>Pendientes</h2>
            <ul id="list-pending"></ul>
          </div>

          <div class="column">
            <h2>En progreso</h2>
            <ul id="list-progress"></ul>
          </div>

          <div class="column">
            <h2>Terminadas</h2>
            <ul id="list-done"></ul>
          </div>
        </div>
      </div>

      <!-- FUTURO -->
      <div class="graphics-container"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
